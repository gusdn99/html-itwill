<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <th:block th:replace="~{/layout/fragments :: documentHeader}"></th:block>
    </head>
    <body>
        <div th:replace="~{/layout/fragments :: pageHeader('부서 상세 정보')}"></div>
        
        <main class="m-2">
            <section>
                <h2>부서 상세 정보</h2>
                <table class="table table-striped table-hover">
                    <tbody th:object="${department}">
                        <tr>
                            <th>번호</th>
                            <td th:text="*{id}"></td>
                        </tr>
                        <tr>
                            <th>이름</th>
                            <td th:text="*{departmentName}"></td>
                        </tr>
                        <tr>
                            <th>매니저</th>
                            <td>
                                <th:block th:if="*{manager != null}">
                                    <a th:href="@{/employee/details/{id}(id=*{manager.id})}"
                                        th:text="|*{manager.firstName} *{manager.lastName}|"></a>
                                </th:block>
                                <th:block th:if="*{manager == null}">
                                    ---
                                </th:block>
                            </td>
                        </tr>
                        <tr>
                            <th>위치</th>
                            <td>
                                <a th:href="@{/location/details/{id}(id=*{location.id})}"
                                    th:text="*{location.city}"></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
            
             
            <section>
                <h2>부서 직원 목록</h2>
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>사번</th>
                            <th>이름</th>
                            <th>전화번호</th>
                            <th>직책</th>
                            <th>부서</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="emp : ${page.content}" th:object="${emp}">
                            <td>
                                <a th:href="@{/employee/details/{id}(id=*{employeeId})}" th:text="*{employeeId}"></a>
                            </td>
                            <td>
                                <a th:href="@{/employee/details/{id}(id=*{employeeId})}" th:text="*{employeeName}"></a>
                            </td>
                            <td th:text="*{phoneNumber}"></td>
                            <td th:text="*{jobTitle}"></td>
                            <td th:text="*{departmentName}"></td>
                        </tr>
                    </tbody>
                </table>
                
                <div class="mt-2">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${!page.hasPrevious()} ? 'disabled'">
                            <a class="page-link" th:href="@{|/department/details?id=${department.id}&p=${page.number - 1}|}">이전</a>
                        </li>
                        <li class="page-item" th:each="pageNo : ${#numbers.sequence(0, page.totalPages - 1)}"
                            th:if="${pageNo >= page.number - 5 && pageNo < page.number + 5}"
                            th:classappend="${pageNo == page.number} ? 'active'">
                            <a class="page-link" th:href="@{|/department/details?id=${department.id}&p=${pageNo}|}" th:text="${pageNo + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${!page.hasNext()} ? 'disabled'">
                            <a class="page-link" th:href="@{|/department/details?id=${department.id}&p=${page.number + 1}|}">다음</a>
                        </li>
                    </ul>
                </div>
            </section>
             
        </main>
        
        <th:block th:replace="~{/layout/fragments :: bootstrapJS}"></th:block>
    </body>
</html>
