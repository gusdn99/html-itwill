<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <th:block th:fragment="documentHeader">
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Spring Boot 5</title>
            <link
                href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
                rel="stylesheet"
                integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
                crossorigin="anonymous">
        </th:block>
    </head>
    <body>
        <th:block th:fragment="pageHeader(title)">
            <header class="mt-2 p-4 text-bg-primary text-center">
                <h1 th:text="${title}"></h1>
            </header>

            <nav class="mt-2 navbar navbar-expand-sm bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand" th:href="@{/}">Home</a>
                    <button class="navbar-toggler" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false"
                        aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link"
                                    th:href="@{/post/list}">포스트 목록</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link"
                                    th:href="@{/post/create}">새 포스트</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link disabled">TODO</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </th:block>
        
        <th:block th:fragment="pagination">
            <nav>
                <ul class="pagination justify-content-center"
                    th:with="uriBuilder=${T(com.itwill.springboot5.web.ServletUriComponentsBuilderWrapper).fromCurrentRequest()}">
                    <!--
                    th:with는 변수 선언 속성. (여기서는 uriBuilder가 변수 이름)          
                    T(com.itwill.springboot5.web.ServletUriComponentsBuilderWrapper).fromCurrentRequest()를 호출해서 
                    현재 요청의 URI를 기반으로 한 UriComponentsBuilder 인스턴스를 생성함.
                    이 인스턴스를 사용하여 현재 URI를 수정하거나 파라미터를 추가/변경할 수 있음.
                     -->
                    <li class="page-item"
                        th:classappend="${!page.hasPrevious} ? 'disabled'">
                        <a class="page-link"
                            th:href="@{${uriBuilder.replaceQueryParam('p', page.number - 1).toUriString()}}">이전</a>
                            <!--
                            replaceQueryParam: UriComponentsBuilder 클래스의 메서드임.
                            URI의 쿼리 파라미터를 교체하거나 추가하는 데 사용됨.
                            쿼리 파라미터가 이미 존재하면 값을 교체하고, 없으면 새로 추가함.
                            -->
                    </li>
                    <li class="page-item"
                        th:each="pageNo : ${#numbers.sequence(0, page.totalPages - 1)}"
                        th:if="${pageNo >= page.number - 5 && pageNo < page.number + 5}"
                        th:classappend="${pageNo == page.number} ? 'active'">
                        <a class="page-link"
                            th:href="@{${uriBuilder.replaceQueryParam('p', pageNo).toUriString()}}"
                            th:text="${pageNo + 1}"></a>
                    </li>
                    <li class="page-item"
                        th:classappend="${!page.hasNext} ? 'disabled'">
                        <a class="page-link"
                            th:href="@{${uriBuilder.replaceQueryParam('p', page.number + 1).toUriString()}}">다음</a>
                    </li>
                </ul>
            </nav>
        </th:block>
		
        <th:block th:fragment="bootstrapJS">
            <script
                src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
                crossorigin="anonymous"></script>
        </th:block>  
	</body>
</html>
